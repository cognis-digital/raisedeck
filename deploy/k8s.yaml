apiVersion: apps/v1
kind: Deployment
metadata: { name: raisedeck, labels: { app: raisedeck } }
spec:
  replicas: 1
  selector: { matchLabels: { app: raisedeck } }
  template:
    metadata: { labels: { app: raisedeck } }
    spec:
      containers:
        - name: raisedeck
          image: ghcr.io/cognis-digital/raisedeck:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: raisedeck }
spec:
  selector: { app: raisedeck }
  ports: [{ port: 80, targetPort: 8000 }]
